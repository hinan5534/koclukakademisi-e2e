name: Playwright E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Production health check — her gün 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite (smoke | regression | all)'
        required: false
        default: 'smoke'

env:
  BASE_URL: ${{ vars.BASE_URL || 'https://koclukakademisi.com' }}

jobs:
  # ─── Smoke Tests ─────────────────────────────────────────────
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npx playwright test --grep @smoke --project=chromium
        env:
          BASE_URL: ${{ env.BASE_URL }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 7

  # ─── Regression Tests (parallel, all browsers) ───────────────
  regression:
    name: Regression — ${{ matrix.project }}
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.project }}

      - name: Run regression tests
        run: npx playwright test --grep @regression --project=${{ matrix.project }}
        env:
          BASE_URL: ${{ env.BASE_URL }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-${{ matrix.project }}-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  # ─── Mobile Tests ─────────────────────────────────────────────
  mobile:
    name: Mobile Tests
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run mobile tests
        run: npx playwright test tests/homepage/homepage.responsive.spec.ts --project=mobile-chrome --project=mobile-safari
        env:
          BASE_URL: ${{ env.BASE_URL }}

      - name: Upload mobile report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 7

  # ─── Report Summary ───────────────────────────────────────────
  report:
    name: Test Report Summary
    runs-on: ubuntu-latest
    needs: [smoke, regression, mobile]
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-reports/

      - name: Publish test summary
        run: |
          echo "## 🧪 Playwright Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke | ${{ needs.smoke.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Regression Chromium | ${{ needs.regression.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Mobile | ${{ needs.mobile.result }} |" >> $GITHUB_STEP_SUMMARY
